<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Protected</title>
<style>
  :root { --cream:#fffff8; --ink:#111; --muted:#555; --accent:#a00; --rule:#dcdcd2; }
  html,body { margin:0; padding:0; background:var(--cream); color:var(--ink);
    font-family:"Palatino Linotype","Book Antiqua",Palatino,Georgia,serif; line-height:1.55; }
  a { color:var(--accent); }

  /* gate */
  #auth-gate { min-height:100vh; display:flex; flex-direction:column; align-items:center;
    justify-content:center; text-align:center; padding:1.5rem; }
  #auth-gate h1 { font-size:1.15rem; font-weight:600; letter-spacing:.02em; color:var(--ink); margin:0 0 .2rem; }
  #auth-gate .lock { font-size:1.6rem; color:var(--accent); margin-bottom:.5rem; }
  .gate-card { width:100%; max-width:22rem; }
  #pw-input { font-family:inherit; font-size:1rem; padding:.55rem .65rem; border:1px solid #bbb;
    background:#fff; width:100%; box-sizing:border-box; margin:.7rem 0 .4rem; }
  #pw-input:focus { outline:none; border-color:var(--accent); }
  #unlock-btn { font-family:inherit; font-size:1rem; padding:.5rem 1.4rem; background:var(--accent);
    color:#fff; border:none; cursor:pointer; }
  #pw-error { color:var(--accent); font-size:.9rem; display:none; margin-top:.6rem; }
  .gate-hint { color:#999; font-size:.8rem; margin-top:1rem; font-style:italic; }

  /* content */
  #main-content { max-width:44rem; margin:0 auto; padding:3rem 1.25rem 5rem; }
  .masthead h1 { font-size:2rem; font-weight:600; margin:0 0 .25rem; letter-spacing:-.01em; }
  .masthead .sub { color:var(--muted); font-style:italic; font-size:1.02rem; margin:0 0 1rem; }
  h2 { font-size:1.32rem; font-weight:600; margin:2.6rem 0 .6rem; padding-bottom:.25rem;
    border-bottom:1px solid var(--rule); }
  p, li { font-size:1.03rem; }
  ul, ol { padding-left:1.3rem; }
  li { margin:.4rem 0; }
  table { width:100%; border-collapse:collapse; margin:1.1rem 0; font-size:.95rem; }
  thead th { text-align:left; border-bottom:1.5px solid #333; padding:.4rem .6rem;
    font-weight:600; font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; color:#444; }
  tbody td { border-bottom:1px solid var(--rule); padding:.55rem .6rem; vertical-align:top; }
  tbody tr td:first-child { font-weight:600; }
  .flag { border-left:3px solid var(--accent); background:#faf6ea; padding:.8rem 1rem; margin:1.3rem 0; font-size:.99rem; }
  .colophon { margin-top:3.5rem; padding-top:1rem; border-top:1px solid var(--rule); color:#888;
    font-size:.85rem; font-style:italic; }
  @media (max-width:560px){ table, thead, tbody, th, td, tr { display:block; }
    thead { display:none; } tbody td { border:none; padding:.15rem 0; }
    tbody tr { border-bottom:1px solid var(--rule); padding:.6rem 0; display:block; }
    tbody tr td:first-child { font-size:1.02rem; } }
</style>
</head>
<body>
<div id="auth-gate">
  <div class="gate-card">
    <div class="lock">&#9679;</div>
    <h1>Protected notes</h1>
    <input id="pw-input" type="password" placeholder="password" autocomplete="off" autofocus>
    <div><button id="unlock-btn">Unlock</button></div>
    <div id="pw-error">Wrong password.</div>
    <div class="gate-hint">Internal &mdash; ask Alex for the password.</div>
  </div>
</div>

<script>
async function deriveKey(password, salt) {
  var enc = new TextEncoder();
  var km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:salt, iterations:100000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']);
}
async function decryptAndInject(password) {
  var b64 = document.getElementById('encrypted-payload').textContent.trim();
  var raw = Uint8Array.from(atob(b64), function(c){ return c.charCodeAt(0); });
  var salt = raw.slice(0,16), iv = raw.slice(16,28), ct = raw.slice(28);
  var key = await deriveKey(password, salt);
  var buf = await crypto.subtle.decrypt({name:'AES-GCM', iv:iv}, key, ct);
  document.getElementById('main-content').innerHTML = new TextDecoder().decode(buf);
}
async function unlock() {
  var pw = document.getElementById('pw-input').value;
  try {
    await decryptAndInject(pw);
    sessionStorage.setItem('llc-pw', pw);
    document.getElementById('auth-gate').style.display = 'none';
    window.scrollTo(0,0);
  } catch(e) {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.getElementById('unlock-btn').addEventListener('click', unlock);
document.getElementById('pw-input').addEventListener('keydown', function(e){ if (e.key === 'Enter') unlock(); });
(async function(){
  var cached = sessionStorage.getItem('llc-pw');
  if (!cached) return;
  try {
    await decryptAndInject(cached);
    document.getElementById('auth-gate').style.display = 'none';
  } catch(e) { sessionStorage.removeItem('llc-pw'); }
})();
</script>
