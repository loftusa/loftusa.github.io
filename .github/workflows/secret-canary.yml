# TEMPORARY diagnostic — prints secret LENGTHS only (never values). Delete after use.
name: secret-canary
on: workflow_dispatch
jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - name: measure secret lengths
        env:
          A: ${{ secrets.ANTHROPIC_API_KEY }}
          CE: ${{ secrets.HOUSES_CANARY_EMPTY }}
          CP: ${{ secrets.HOUSES_CANARY_PIPE }}
          CB: ${{ secrets.HOUSES_CANARY_BODY }}
        run: |
          echo "len ANTHROPIC_API_KEY   = ${#A}"
          echo "len HOUSES_CANARY_EMPTY = ${#CE}"
          echo "len HOUSES_CANARY_PIPE  = ${#CP}"
          echo "len HOUSES_CANARY_BODY  = ${#CB}"
